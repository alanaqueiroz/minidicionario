<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minidicionário</title>
    <style>
        body {
            margin: 0;
            display: flex;
            min-height: 100vh;
            justify-content: center; 
            align-items: center;
            background-color: rgb(37, 37, 37);
            font-family: 'Courier New', Courier, monospace;
        }
        .container {
            background-color: rgba(255,255,255,.3);
            padding: 28px;
            border-radius: 7px;
            box-shadow: 0 10px 10px rgba(0,0,0,.3);
            width: 90%;
            margin:10px;
            max-width: 450px;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
        }
        .heading {
            font-size:28px;
        }
        .input {
            height:53px;
            width:300px;
            background-color: rgba(255,255,255,.6);
            border-color:rgba(255,255,255,.4);
            font-size: 16px;
            padding: 0 42px;
            border-radius:5px;
            margin-bottom: 10px;
        }
        .search-btn {
            height:53px;
            width:300px;
            background-color: rgba(0,0,0,.6);
            color: white;
            border: none;
            font-size: 16px;
            border-radius:5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .search-btn:hover {
            background-color: rgba(0,0,0,.8);
        }
        .meaning-container {
            display:none;
        }
        .instructions {
            font-size: 14px;
            margin-top: 10px;
            color: #333;
        }
        .translation {
            font-size: 16px;
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="heading">Minidicionário</h1>
        <input placeholder="Digite uma palavra para consultar" type="text" class="input" id="input" />
        <button class="search-btn" id="search-btn">Pesquisar</button>
        <p class="info-text" id="info-text">Digite uma palavra e pressione Enter</p>
        <p class="instructions">Obs: A pronúncia em áudio é somente para palavras em inglês</p>
        <div class="meaning-container" id="meaning-container">
            <p>Palavra: <span class="title" id="title">____</span> <span class="translation" id="translation"></span></p>
            <p>Significado: <span class="meaning" id="meaning">____</span></p>
            <audio src="" controls id="audio" style="display:none;"></audio>
        </div>
    </div>
    <script>
        const inputEl = document.getElementById("input");
        const infoTextEl = document.getElementById("info-text");
        const meaningContainerEl = document.getElementById("meaning-container");
        const titleEl = document.getElementById("title");
        const meaningEl = document.getElementById("meaning");
        const audioEl = document.getElementById("audio");
        const translationEl = document.getElementById("translation");
        const searchBtn = document.getElementById("search-btn");

        function removeHTMLTags(text) {
            return text.replace(/<[^>]*>?/gm, '');
        }

        async function translateText(text, sourceLang, targetLang) {
            try {
                const response = await fetch(
                    `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`
                );
                const data = await response.json();
                return removeHTMLTags(data.responseData.translatedText || text);
            } catch (error) {
                console.error("Translation error:", error);
                return text;
            }
        }

        function isEnglish(word) {
            if (/[ãõâêîôûáéíóúàèìòùç]/i.test(word)) {
                return false;
            }
            return /^[a-zA-Z\-']+$/.test(word);
        }

        async function fetchAPI(word) {
            try {
                infoTextEl.style.display = "block";
                meaningContainerEl.style.display = "none";
                infoTextEl.innerText = `Buscando o significado de "${word}"...`;
                translationEl.innerText = "";
                
                const isEng = isEnglish(word);
                let searchWord = word;
                
                if (isEng) {
                    const translated = await translateText(word, 'en', 'pt');
                    translationEl.innerText = `(${translated})`;
                } else {
                    searchWord = await translateText(word, 'pt', 'en');
                }
                
                const url = `https://api.dictionaryapi.dev/api/v2/entries/en/${searchWord.toLowerCase()}`;
                const result = await fetch(url).then((res) => res.json());

                if (result.title) {
                    meaningContainerEl.style.display = "block";
                    infoTextEl.style.display = "none";
                    titleEl.innerText = word;
                    meaningEl.innerText = "Palavra não encontrada";
                    audioEl.style.display = "none";
                } else {
                    const definition = result[0].meanings[0].definitions[0].definition;
                    const translatedDefinition = await translateText(definition, 'en', 'pt');
                    
                    infoTextEl.style.display = "none";
                    meaningContainerEl.style.display = "block";
                    titleEl.innerText = word;
                    meaningEl.innerText = translatedDefinition;
                    
                    if (isEng && result[0].phonetics?.[0]?.audio) {
                        audioEl.src = result[0].phonetics[0].audio;
                        audioEl.style.display = "inline-flex";
                    } else {
                        audioEl.style.display = "none";
                    }
                }
            } catch (error) {
                console.log(error);
                infoTextEl.innerText = "Ocorreu um erro. Tente novamente mais tarde.";
            }
        }

        inputEl.addEventListener("keyup", (e) => {
            if (e.target.value && e.key === "Enter") {
                fetchAPI(e.target.value);
            }
        });

        searchBtn.addEventListener("click", () => {
            if (inputEl.value) {
                fetchAPI(inputEl.value);
            }
        });
    </script>
</body>
</html>
